<!DOCTYPE html>
<html>
<head>
    <title>Test Year-Semester Dropdown</title>
    <style>
        body { font-family: Arial; padding: 50px; }
        select, button { padding: 10px; margin: 10px; font-size: 16px; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Test Year-Semester Dropdown</h1>
    
    <label>Select Year:</label>
    <select id="yearSelect">
        <option value="">--Select Year--</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>
    
    <br><br>
    
    <label>Select Semester:</label>
    <select id="semesterSelect">
        <option value="">--Select Semester--</option>
    </select>
    
    <div class="result" id="result"></div>
    
    <script>
        console.log('Script loaded');
        
        document.getElementById('yearSelect').onchange = function() {
            const year = this.value;
            const semSelect = document.getElementById('semesterSelect');
            const result = document.getElementById('result');
            
            console.log('Year selected:', year);
            
            semSelect.innerHTML = '<option value="">--Select Semester--</option>';
            
            if (year) {
                const semesterMap = {
                    '1': ['1', '2'],
                    '2': ['3', '4'],
                    '3': ['5', '6'],
                    '4': ['7', '8']
                };
                
                const semesters = semesterMap[year];
                console.log('Semesters for year', year, ':', semesters);
                
                semesters.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = 'Semester ' + s;
                    semSelect.appendChild(opt);
                    console.log('Added semester option:', s);
                });
                
                result.innerHTML = `<strong>✓ Year ${year} selected</strong><br>Semester dropdown should now show: ${semesters.map(s => 'Semester ' + s).join(', ')}`;
            } else {
                result.innerHTML = 'Please select a year';
            }
        };
        
        document.getElementById('semesterSelect').onchange = function() {
            const sem = this.value;
            const year = document.getElementById('yearSelect').value;
            const result = document.getElementById('result');
            
            if (sem) {
                result.innerHTML = `<strong>✓ Selected:</strong> Year ${year}, Semester ${sem}`;
            }
        };
    </script>
</body>
</html>
