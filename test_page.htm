<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
</head>
<body>
    <h1>Button Test Page</h1>
    <button onclick="testClick()">Click Me</button>
    <div id="result"></div>
    
    <script>
        function testClick() {
            document.getElementById('result').innerHTML = 'Button works!';
            alert('JavaScript is working!');
        }
    </script>
</body>
</html>
